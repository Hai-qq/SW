<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#5f5e5e",
              "surface-container-highest": "#eae9d7",
              "surface-container-lowest": "#ffffff",
              "outline": "#818172",
              "outline-variant": "#bbbaaa",
              "on-surface": "#38392c",
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f7f4ec; 
            min-height: max(884px, 100dvh);
        }
        .asymmetric-shape {
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 40%;
        }
    </style>
  </head>
<body class="font-body text-on-surface antialiased min-h-screen flex flex-col items-center justify-between py-12 px-6">
<!-- Progress Indicator -->
<header class="w-full max-w-md">
<div class="flex justify-between items-end mb-3">
<span class="font-headline font-bold text-primary text-xl">01<span class="text-outline-variant font-normal text-sm">/10</span></span>
<span class="text-label-md font-medium text-outline tracking-widest uppercase">Discovery</span>
</div>
<div class="h-1 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-[10%] transition-all duration-500"></div>
</div>
</header>
<main class="flex-1 w-full max-w-md flex flex-col justify-center items-center gap-12 relative">
<div class="absolute -z-10 w-64 h-64 bg-surface-container-low asymmetric-shape blur-3xl opacity-50 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
<div class="w-full aspect-[3/4] bg-surface-container-lowest rounded-xl shadow-[0_48px_100px_-12px_rgba(56,57,44,0.08)] flex flex-col items-center justify-center p-12 text-center relative overflow-hidden group">
<div class="mb-8 p-4 bg-surface-container rounded-full">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="diversity_3">diversity_3</span>
</div>
<h1 class="font-headline text-3xl md:text-4xl text-on-surface leading-tight mb-4">
                1. Your biological sex?
            </h1>
<p class="text-outline font-body text-sm max-w-[200px]">
                To help us calibrate your resonance frequency.
            </p>
<div class="absolute bottom-10 inset-x-0 flex justify-around opacity-40">
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined" data-icon="keyboard_double_arrow_left">keyboard_double_arrow_left</span>
<span class="text-[10px] font-bold tracking-tighter">SWIPE MALE</span>
</div>
<div class="flex flex-col items-center gap-2">
<span class="material-symbols-outlined" data-icon="keyboard_double_arrow_right">keyboard_double_arrow_right</span>
<span class="text-[10px] font-bold tracking-tighter">SWIPE FEMALE</span>
</div>
</div>
</div>
<div class="w-full flex gap-4">
<button class="flex-1 h-24 bg-surface-container-highest hover:bg-primary hover:text-white transition-all duration-300 rounded-lg flex flex-col items-center justify-center gap-1 group active:scale-95">
<span class="font-headline font-bold text-lg">Male</span>
<span class="text-[10px] uppercase tracking-widest opacity-60">Swipe Left</span>
</button>
<button class="flex-1 h-24 bg-surface-container-highest hover:bg-primary hover:text-white transition-all duration-300 rounded-lg flex flex-col items-center justify-center gap-1 group active:scale-95">
<span class="font-headline font-bold text-lg">Female</span>
<span class="text-[10px] uppercase tracking-widest opacity-60">Swipe Right</span>
</button>
</div>
</main>
<footer class="w-full max-w-md flex flex-col items-center">
<div class="flex justify-between w-full px-2 mt-6">
<button class="text-sm font-medium text-outline hover:text-primary flex items-center gap-1 transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="arrow_back">arrow_back</span> Back
            </button>
<button class="text-sm font-medium text-outline hover:text-primary transition-colors">
                Prefer not to say
            </button>
</div>
</footer>
</body></html>
