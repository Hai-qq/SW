    body { 
        background: linear-gradient(180deg, #F5F3ED 0%, #D4DDDB 100%); 
        min-height: 100vh; 
        font-family: 'Inter', sans-serif;
        overflow: hidden; /* 防止移动端整体滚动 */
        touch-action: none;
    }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; display: inline-block; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    
    /* 容器区域限制 */
    .app-container {
        max-width: 480px; 
        margin: 0 auto; 
        height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
    }
    
    /* 卡片拖拽动画与定位 */
    .card-container {
        flex: 1;
        position: relative;
        perspective: 1000px;
        z-index: 10;
    }
    
    .swipe-card {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0; left: 0;
        background: #FFFFFF;
        border-radius: 40px;
        box-shadow: 0 16px 80px rgba(49, 51, 43, 0.08);
        border: 1px solid rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
        transform-origin: 50% 100%; /* 从底部开始旋转 */
        will-change: transform;
        cursor: grab;
    }
    .swipe-card:active { cursor: grabbing; }

    /* 装饰网格 */
    .grid-icon { display: grid; grid-template-columns: repeat(2, 4px); gap: 4px; }
    .grid-dot { width: 4px; height: 4px; background-color: #1A1A1A; border-radius: 50%; }

    /* Modal */
    .modal-overlay {
        position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        z-index: 999; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
</style>
</head>

    <!-- 可划卡片区 -->

                    <div class="h-[3px] w-full bg-black/5 rounded-full overflow-hidden relative">

            <p class="text-sm text-black/60 leading-relaxed mb-6">今日基础用户上滑丢弃功能 (5次) 已用尽，升级三观库可解锁无限划卡功能。</p>
            <button class="w-full bg-[#1A1A1A] text-white py-3 rounded-full text-xs font-bold tracking-widest uppercase outline-none" onclick="document.getElementById('limitModal').classList.remove('active');">确认</button>
        </div>

<script>
    const card = document.getElementById('main-card');
    let isDragging = false, startX = 0, startY = 0, currentX = 0, currentY = 0;
    
    // Limits
    let upSwipeCount = 0;
    const MAX_UP_SWIPES = 5;

    // Data Mock
    const mockData = [
        { name: "MARCUS的档案", tags: "社交 · 偏好", content: "“微信永远不发语音，认为发几秒以上的语音是不尊重人。”", percent: "30%" },
        { name: "ELENA的档案", tags: "情感 · 自由", content: "“灵魂伴侣不一定要通过婚姻来定义。”", percent: "80%" }
    ];
    let dataIndex = 0;

    // Event Listeners for Touch/Mouse
    card.addEventListener('mousedown', dragStart);
    card.addEventListener('touchstart', dragStart, {passive: false});
    window.addEventListener('mousemove', dragMove);
    window.addEventListener('touchmove', dragMove, {passive: false});
    window.addEventListener('mouseup', dragEnd);
    window.addEventListener('touchend', dragEnd);

    function dragStart(e) {
        if(e.type === 'touchstart') e = e.touches[0];
        isDragging = true;
        startX = e.clientX;
        startY = e.clientY;
        card.style.transition = 'none';
    }

    function dragMove(e) {
        if (!isDragging) return;
        // if(e.type === 'touchmove') e.preventDefault(); // Prevent scrolling
        const currentE = e.type === 'touchmove' ? e.touches[0] : e;
        currentX = currentE.clientX - startX;
        currentY = currentE.clientY - startY;
        const rotate = currentX * 0.05;
        card.style.transform = `translateX(${currentX}px) translateY(${currentY}px) rotate(${rotate}deg)`;
    }

    function dragEnd() {
        if (!isDragging) return;
        isDragging = false;
        const THRESHOLD = 100;
        
        if (currentX > THRESHOLD) {
            animateSwipe('right');
        } else if (currentX < -THRESHOLD) {
            animateSwipe('left');
        } else if (currentY < -THRESHOLD && Math.abs(currentY) > Math.abs(currentX)) {
            handleUpSwipe();
        } else {
            resetCard();
        }
    }

    function animateSwipe(direction) {
        const moveX = direction === 'right' ? window.innerWidth : -window.innerWidth;
        card.style.transition = 'transform 0.4s ease-out';
        card.style.transform = `translateX(${moveX}px) rotate(${direction === 'right' ? 30 : -30}deg)`;
        setTimeout(loadNextCard, 300);
    }

    function forceSwipe(direction) {
        if(!isDragging){
            animateSwipe(direction);
        }
    }

    function handleUpSwipe() {
        if(upSwipeCount >= MAX_UP_SWIPES) {
            resetCard();
            document.getElementById('limitModal').classList.add('active');
            return;
        }
        upSwipeCount++;
        card.style.transition = 'transform 0.4s ease-out';
        card.style.transform = `translateY(-${window.innerHeight}px) rotate(0deg)`;
        setTimeout(loadNextCard, 300);
    }

    function resetCard() {
        card.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
        card.style.transform = `translateX(0px) translateY(0px) rotate(0deg)`;
        currentX = 0; currentY = 0;
    }

    function loadNextCard() {
        card.style.transition = 'none';
        card.style.transform = `translateX(0px) translateY(50px) scale(0.95)`;
        
        const nextData = mockData[dataIndex % mockData.length];
        document.getElementById('cardName').innerText = nextData.name;
        document.getElementById('cardTags').innerText = nextData.tags;
        document.getElementById('cardContent').innerText = nextData.content;
        document.getElementById('cardPercent').style.width = nextData.percent;
        
        dataIndex++;

        // Trigger reflow
        void card.offsetWidth;

        card.style.transition = 'all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
        card.style.transform = `translateX(0px) translateY(0px) scale(1)`;
        currentX = 0; currentY = 0;
    }

    function openAI() {
        alert("调用后台 API 以获取该卡片的 AI 的历史评价与语音分析...");
    }
</script>
